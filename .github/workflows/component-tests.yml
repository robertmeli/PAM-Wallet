name: Component Tests CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  component-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore PAM-Wallet.slnx

      - name: Build
        run: dotnet build PAM-Wallet.slnx --configuration Release --no-restore

      - name: Run component tests
        run: dotnet test tests/Wallet.ComponentTests/Wallet.ComponentTests.csproj --configuration Release --no-build --no-restore --verbosity minimal
